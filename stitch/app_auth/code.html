<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-tertiary-container": "#bdffdb",
          "surface-container-lowest": "#ffffff",
          "on-secondary-fixed-variant": "#3f465c",
          "on-secondary-fixed": "#131b2e",
          "surface-container-highest": "#e0e3e5",
          "on-surface": "#191c1e",
          "secondary-container": "#dae2fd",
          "primary-container": "#2563eb",
          "on-secondary-container": "#5c647a",
          "primary-fixed": "#dbe1ff",
          "on-tertiary-fixed-variant": "#005236",
          "tertiary-fixed": "#6ffbbe",
          "outline-variant": "#c3c6d7",
          "on-background": "#191c1e",
          "on-primary": "#ffffff",
          "surface-tint": "#0053db",
          "on-error-container": "#93000a",
          "on-primary-fixed": "#00174b",
          "on-primary-fixed-variant": "#003ea8",
          "inverse-primary": "#b4c5ff",
          "secondary-fixed": "#dae2fd",
          "error": "#ba1a1a",
          "on-secondary": "#ffffff",
          "surface-container-high": "#e6e8ea",
          "surface-container-low": "#f2f4f6",
          "on-surface-variant": "#434655",
          "on-tertiary": "#ffffff",
          "tertiary": "#006242",
          "primary-fixed-dim": "#b4c5ff",
          "surface-container": "#eceef0",
          "primary": "#004ac6",
          "secondary-fixed-dim": "#bec6e0",
          "on-tertiary-fixed": "#002113",
          "on-error": "#ffffff",
          "tertiary-fixed-dim": "#4edea3",
          "tertiary-container": "#007d55",
          "surface-dim": "#d8dadc",
          "surface-bright": "#f7f9fb",
          "error-container": "#ffdad6",
          "background": "#f7f9fb",
          "on-primary-container": "#eeefff",
          "inverse-surface": "#2d3133",
          "surface-variant": "#e0e3e5",
          "surface": "#f7f9fb",
          "secondary": "#565e74",
          "outline": "#737686",
          "inverse-on-surface": "#eff1f3"
        },
        fontFamily: {
          "headline": ["Pretendard", "Manrope", "sans-serif"],
          "body": ["Inter", "Pretendard", "sans-serif"],
          "label": ["Inter", "Pretendard", "sans-serif"]
        },
        borderRadius: {
          "DEFAULT": "0.25rem",
          "lg": "0.5rem",
          "xl": "0.75rem",
          "2xl": "1rem",
          "3xl": "1.5rem",
          "full": "9999px"
        },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .material-symbols-outlined.filled {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  body { font-family: 'Pretendard', sans-serif; }
  .data-number { font-family: 'Inter', sans-serif; }

  /* Gradient for hero section */
  .hero-gradient {
    background: linear-gradient(160deg, #004ac6 0%, #2563eb 60%, #3b82f6 100%);
  }

  /* Curved bottom for hero */
  .hero-curve {
    position: relative;
  }
  .hero-curve::after {
    content: '';
    position: absolute;
    bottom: -40px;
    left: 0;
    right: 0;
    height: 80px;
    background: inherit;
    border-radius: 0 0 50% 50% / 0 0 100% 100%;
  }

  /* Button gradient */
  .btn-gradient {
    background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
  }
  .btn-gradient:hover {
    background: linear-gradient(135deg, #003da6 0%, #1d4ed8 100%);
  }

  /* Subtle input focus ring */
  .input-field:focus {
    outline: none;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    border-color: #2563eb;
  }

  /* Phone frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12), 0 4px 16px rgba(0, 0, 0, 0.08);
    position: relative;
    background: #ffffff;
  }

  /* OTP box */
  .otp-box {
    width: 44px;
    height: 52px;
    border-radius: 12px;
    background: #f2f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 20px;
    color: #191c1e;
  }
  .otp-box.filled {
    background: #dbe1ff;
    color: #004ac6;
  }

  /* Scrollbar hide */
  .scroll-hide::-webkit-scrollbar { display: none; }
  .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

  /* Step dot */
  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .step-dot.active {
    width: 24px;
    border-radius: 4px;
    background: #004ac6;
  }
  .step-dot.inactive {
    background: #e0e3e5;
  }
</style>
</head>
<body class="bg-surface-container-high min-h-screen flex items-center justify-center p-8">

<!-- Two screens side by side -->
<div class="flex flex-row gap-8 items-start">

  <!-- ============================================================ -->
  <!-- SCREEN 1: LOGIN -->
  <!-- ============================================================ -->
  <div class="phone-frame flex flex-col bg-white">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-3 pb-1 bg-transparent relative z-20" style="background: #004ac6;">
      <span class="text-white text-sm font-semibold data-number">9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="white" opacity="0.4"/><rect x="5" y="2" width="3" height="10" rx="1" fill="white" opacity="0.6"/><rect x="10" y="0" width="3" height="12" rx="1" fill="white" opacity="0.8"/><rect x="15" y="0" width="3" height="12" rx="1" fill="white"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.4C5.6 2.4 3.4 3.3 1.8 4.8L0 3C2 1.1 4.9 0 8 0s6 1.1 8 3l-1.8 1.8C12.6 3.3 10.4 2.4 8 2.4z" fill="white" opacity="0.4"/><path d="M8 5.6C6.4 5.6 4.9 6.2 3.8 7.2L2 5.4c1.5-1.4 3.6-2.2 6-2.2s4.5.8 6 2.2l-1.8 1.8C11.1 6.2 9.6 5.6 8 5.6z" fill="white" opacity="0.7"/><path d="M8 8.8c-.9 0-1.8.4-2.4 1L8 12l2.4-2.2c-.6-.6-1.5-1-2.4-1z" fill="white"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="white" opacity="0.4"/><rect x="25" y="4" width="2" height="5" rx="1" fill="white" opacity="0.4"/><rect x="2" y="2" width="20" height="9" rx="2" fill="white"/></svg>
      </div>
    </div>

    <!-- Hero Gradient Section -->
    <div class="hero-gradient hero-curve relative" style="min-height: 260px; z-index: 1;">
      <div class="flex flex-col items-center pt-10 pb-16 relative z-10">
        <!-- Logo -->
        <div class="flex items-center gap-2 mb-3">
          <div class="w-11 h-11 rounded-2xl bg-white/20 backdrop-blur flex items-center justify-center">
            <span class="material-symbols-outlined filled text-white" style="font-size: 26px;">bolt</span>
          </div>
        </div>
        <h1 class="text-white text-2xl font-bold tracking-tight font-headline">Precision Velocity</h1>
        <p class="text-white/70 text-sm mt-1.5 font-medium tracking-wide">배송 매니저</p>

        <!-- Decorative dots -->
        <div class="absolute top-8 left-8 w-2 h-2 rounded-full bg-white/10"></div>
        <div class="absolute top-20 right-12 w-3 h-3 rounded-full bg-white/8"></div>
        <div class="absolute bottom-14 left-16 w-1.5 h-1.5 rounded-full bg-white/15"></div>
      </div>
    </div>

    <!-- Form Card (overlapping hero) -->
    <div class="flex-1 px-6 relative z-10" style="margin-top: -48px;">
      <div class="bg-white rounded-3xl p-6 shadow-lg" style="box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), 0 2px 8px rgba(0, 0, 0, 0.04);">

        <!-- Phone Input -->
        <div class="mb-4">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">휴대폰 번호</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">phone_android</span>
            <input type="tel" placeholder="010-0000-0000" class="input-field w-full h-[52px] pl-12 pr-4 rounded-xl bg-surface-container-low border-0 text-on-surface text-[15px] data-number placeholder:text-outline-variant transition-all" />
          </div>
        </div>

        <!-- Password Input -->
        <div class="mb-6">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">비밀번호</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">lock</span>
            <input type="password" placeholder="비밀번호를 입력하세요" class="input-field w-full h-[52px] pl-12 pr-12 rounded-xl bg-surface-container-low border-0 text-on-surface text-[15px] placeholder:text-outline-variant transition-all" />
            <button class="absolute right-4 top-1/2 -translate-y-1/2">
              <span class="material-symbols-outlined text-outline" style="font-size: 20px;">visibility_off</span>
            </button>
          </div>
        </div>

        <!-- Login Button -->
        <button class="btn-gradient w-full h-[52px] rounded-full text-white font-semibold text-[15px] tracking-wide transition-all active:scale-[0.98] shadow-md" style="box-shadow: 0 4px 16px rgba(0, 74, 198, 0.3);">
          로그인
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px bg-surface-container-high"></div>
          <span class="text-xs text-outline font-medium">또는</span>
          <div class="flex-1 h-px bg-surface-container-high"></div>
        </div>

        <!-- Invite Code Button -->
        <button class="w-full h-[50px] rounded-full border-[1.5px] border-primary/20 text-primary font-semibold text-[14px] flex items-center justify-center gap-2 transition-all hover:bg-primary-fixed/30 active:scale-[0.98]">
          <span class="material-symbols-outlined" style="font-size: 18px;">group_add</span>
          초대코드로 가입하기
        </button>
      </div>

      <!-- Forgot Password -->
      <div class="flex justify-center mt-5 mb-6">
        <button class="text-sm text-outline hover:text-on-surface-variant transition-colors">
          비밀번호를 잊으셨나요?
        </button>
      </div>
    </div>

    <!-- Bottom Safe Area -->
    <div class="h-8 bg-white"></div>
  </div>


  <!-- ============================================================ -->
  <!-- SCREEN 2: REGISTER -->
  <!-- ============================================================ -->
  <div class="phone-frame flex flex-col bg-surface">

    <!-- Status Bar -->
    <div class="flex items-center justify-between px-7 pt-3 pb-1 bg-surface">
      <span class="text-on-surface text-sm font-semibold data-number">9:41</span>
      <div class="flex items-center gap-1.5">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="3" width="3" height="9" rx="1" fill="#191c1e" opacity="0.3"/><rect x="5" y="2" width="3" height="10" rx="1" fill="#191c1e" opacity="0.5"/><rect x="10" y="0" width="3" height="12" rx="1" fill="#191c1e" opacity="0.7"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#191c1e"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.4C5.6 2.4 3.4 3.3 1.8 4.8L0 3C2 1.1 4.9 0 8 0s6 1.1 8 3l-1.8 1.8C12.6 3.3 10.4 2.4 8 2.4z" fill="#191c1e" opacity="0.3"/><path d="M8 5.6C6.4 5.6 4.9 6.2 3.8 7.2L2 5.4c1.5-1.4 3.6-2.2 6-2.2s4.5.8 6 2.2l-1.8 1.8C11.1 6.2 9.6 5.6 8 5.6z" fill="#191c1e" opacity="0.6"/><path d="M8 8.8c-.9 0-1.8.4-2.4 1L8 12l2.4-2.2c-.6-.6-1.5-1-2.4-1z" fill="#191c1e"/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#191c1e" opacity="0.3"/><rect x="25" y="4" width="2" height="5" rx="1" fill="#191c1e" opacity="0.3"/><rect x="2" y="2" width="20" height="9" rx="2" fill="#191c1e"/></svg>
      </div>
    </div>

    <!-- Header -->
    <div class="flex items-center px-4 py-3">
      <button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-surface-container-low transition-colors">
        <span class="material-symbols-outlined text-on-surface" style="font-size: 22px;">arrow_back</span>
      </button>
      <h2 class="text-lg font-bold text-on-surface ml-1 font-headline">회원가입</h2>
    </div>

    <!-- Step Indicator -->
    <div class="flex items-center gap-3 px-6 pb-4">
      <div class="flex items-center gap-1.5">
        <div class="step-dot active"></div>
        <div class="step-dot inactive"></div>
        <div class="step-dot inactive"></div>
      </div>
      <span class="text-xs text-on-surface-variant font-medium ml-1">1/3 기본정보</span>
    </div>

    <!-- Scrollable Form Area -->
    <div class="flex-1 overflow-y-auto scroll-hide px-5 pb-4">

      <!-- Invite Code Section -->
      <div class="bg-white rounded-3xl p-5 mb-4" style="box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);">
        <!-- Invite Code -->
        <div class="mb-3.5">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">초대코드</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">confirmation_number</span>
            <input type="text" value="AGN-2024-A7X3" readonly class="w-full h-[50px] pl-12 pr-12 rounded-xl bg-tertiary/5 border-[1.5px] border-tertiary/20 text-on-surface text-[15px] data-number font-semibold tracking-wider" />
            <div class="absolute right-4 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-tertiary/15 flex items-center justify-center">
              <span class="material-symbols-outlined filled text-tertiary" style="font-size: 16px;">check</span>
            </div>
          </div>
        </div>

        <!-- Detected Agency -->
        <div class="flex items-center gap-2.5 bg-tertiary/5 rounded-xl px-4 py-3">
          <span class="material-symbols-outlined filled text-tertiary" style="font-size: 20px;">storefront</span>
          <div>
            <p class="text-[11px] text-on-surface-variant font-medium">소속 대리점</p>
            <p class="text-[14px] text-tertiary font-semibold">강남 제1 대리점</p>
          </div>
          <span class="material-symbols-outlined filled text-tertiary/60 ml-auto" style="font-size: 16px;">verified</span>
        </div>
      </div>

      <!-- Personal Info Section -->
      <div class="bg-white rounded-3xl p-5" style="box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);">
        <div class="flex items-center gap-1.5 mb-4">
          <span class="material-symbols-outlined text-primary" style="font-size: 18px;">person</span>
          <span class="text-sm font-semibold text-on-surface">개인정보 입력</span>
        </div>

        <!-- Name -->
        <div class="mb-3.5">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">이름</label>
          <input type="text" placeholder="실명을 입력하세요" class="input-field w-full h-[50px] px-4 rounded-xl bg-surface-container-low border-0 text-on-surface text-[15px] placeholder:text-outline-variant transition-all" />
        </div>

        <!-- Birth Date -->
        <div class="mb-3.5">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">생년월일</label>
          <div class="relative">
            <input type="text" placeholder="YYYY.MM.DD" class="input-field w-full h-[50px] px-4 pr-12 rounded-xl bg-surface-container-low border-0 text-on-surface text-[15px] data-number placeholder:text-outline-variant transition-all" />
            <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">calendar_today</span>
          </div>
        </div>

        <!-- Phone + Verify -->
        <div class="mb-3.5">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">휴대폰 번호</label>
          <div class="flex gap-2.5">
            <div class="relative flex-1">
              <input type="tel" placeholder="010-0000-0000" class="input-field w-full h-[50px] px-4 rounded-xl bg-surface-container-low border-0 text-on-surface text-[15px] data-number placeholder:text-outline-variant transition-all" />
            </div>
            <button class="h-[50px] px-4 rounded-xl bg-primary text-white text-[13px] font-semibold whitespace-nowrap transition-all active:scale-[0.97]">
              인증요청
            </button>
          </div>
        </div>

        <!-- OTP Code -->
        <div class="mb-3.5">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">인증번호</label>
          <div class="flex items-center gap-2">
            <div class="flex gap-2 flex-1">
              <div class="otp-box filled">3</div>
              <div class="otp-box filled">8</div>
              <div class="otp-box filled">5</div>
              <div class="otp-box">-</div>
              <div class="otp-box">-</div>
              <div class="otp-box">-</div>
            </div>
            <div class="flex items-center gap-1 text-primary ml-1">
              <span class="material-symbols-outlined" style="font-size: 16px;">timer</span>
              <span class="text-sm font-semibold data-number">2:45</span>
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div class="h-px bg-surface-container-high my-4"></div>

        <!-- Password -->
        <div class="mb-3.5">
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">비밀번호</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">lock</span>
            <input type="password" placeholder="영문, 숫자, 특수문자 포함 8자 이상" class="input-field w-full h-[50px] pl-12 pr-12 rounded-xl bg-surface-container-low border-0 text-on-surface text-[15px] placeholder:text-outline-variant transition-all" />
            <button class="absolute right-4 top-1/2 -translate-y-1/2">
              <span class="material-symbols-outlined text-outline" style="font-size: 20px;">visibility_off</span>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-xs font-medium text-on-surface-variant mb-1.5 ml-0.5">비밀번호 확인</label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" style="font-size: 20px;">lock</span>
            <input type="password" placeholder="비밀번호를 다시 입력하세요" class="input-field w-full h-[50px] pl-12 pr-12 rounded-xl bg-surface-container-low border-0 text-on-surface text-[15px] placeholder:text-outline-variant transition-all" />
            <button class="absolute right-4 top-1/2 -translate-y-1/2">
              <span class="material-symbols-outlined text-outline" style="font-size: 20px;">visibility_off</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Button Area -->
    <div class="px-5 pt-3 pb-2 bg-surface">
      <button class="btn-gradient w-full h-[52px] rounded-full text-white font-semibold text-[15px] tracking-wide transition-all active:scale-[0.98] shadow-md flex items-center justify-center gap-2" style="box-shadow: 0 4px 16px rgba(0, 74, 198, 0.3);">
        다음
        <span class="material-symbols-outlined text-white/80" style="font-size: 18px;">arrow_forward</span>
      </button>
    </div>

    <!-- Progress Bar -->
    <div class="h-1 bg-surface-container-high">
      <div class="h-full bg-primary rounded-r-full" style="width: 33%;"></div>
    </div>

    <!-- Bottom Safe Area -->
    <div class="h-6 bg-surface"></div>
  </div>

</div>

</body>
</html>
